<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Mobile Games — All Unlocked</title>
  <meta name="description" content="Download free mobile games. All unlocked, no ads. iOS & Android."/>
  <meta name="theme-color" content="#07070f"/>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-64VCRKBEW8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-64VCRKBEW8');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg:    #07070f;
      --bg2:   #0d0d1c;
      --acc:   #00f5ff;
      --acc2:  #7b2fff;
      --hot:   #ff2e63;
      --gold:  #ffd700;
      --green: #00ff88;
      --text:  #e8e8ff;
      --muted: rgba(232,232,255,0.38);
      --border:rgba(255,255,255,0.07);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family: 'Oxanium', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content:'';
      position:fixed; inset:0; z-index:-1;
      background-image:
        linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
      background-size:44px 44px;
    }

    /* ── SEARCH + FILTERS ── */
    .top-bar {
      position: sticky; top:0; z-index:100;
      background: rgba(7,7,15,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,245,255,0.1);
      padding: 12px 16px;
    }
    .top-inner { max-width:960px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

    .search-box { position:relative; }
    .search-box input {
      width:100%; height:46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,245,255,0.18);
      border-radius: 8px;
      padding: 0 46px 0 18px;
      font-family:'Oxanium',sans-serif; font-size:.95rem; font-weight:600; color:var(--text);
      outline:none; transition:all .2s;
    }
    .search-box input::placeholder { color:var(--muted); }
    .search-box input:focus {
      border-color:var(--acc);
      background:rgba(0,245,255,0.04);
      box-shadow:0 0 0 3px rgba(0,245,255,0.08);
    }
    .search-icon { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.9rem; pointer-events:none; }
    .clear-x {
      display:none; position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--muted); font-size:.85rem; cursor:pointer; padding:4px 6px;
    }
    .clear-x.vis { display:block; }
    .clear-x.vis ~ .search-icon { display:none; }

    .pills {
      display:flex; gap:7px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;
    }
    .pills::-webkit-scrollbar { display:none; }
    .pill {
      padding:7px 14px; border-radius:6px; font-size:.74rem; font-weight:700; letter-spacing:.5px;
      white-space:nowrap; background:rgba(255,255,255,0.04); border:1px solid var(--border);
      color:var(--muted); cursor:pointer; transition:all .2s; flex-shrink:0;
    }
    .pill:hover { color:var(--acc); border-color:rgba(0,245,255,0.28); }
    .pill.active { color:var(--acc); border-color:rgba(0,245,255,0.4); background:rgba(0,245,255,0.08); }

    /* ── MAIN ── */
    main { max-width:960px; margin:0 auto; padding:20px 16px 60px; }

    .results-bar {
      font-size:.74rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      color:var(--muted); margin-bottom:16px;
    }
    .results-bar strong { color:var(--acc); }

    /* ── GRID ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(255px, 1fr));
      gap:14px;
    }

    /* ── CARD ── */
    .card {
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      transition:transform .25s, border-color .25s, box-shadow .25s;
      animation:fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;transform:translateY(0);}
    }
    .card:hover {
      transform:translateY(-4px);
      border-color:rgba(0,245,255,0.25);
      box-shadow:0 14px 36px rgba(0,0,0,0.5), 0 0 24px rgba(0,245,255,0.06);
    }

    .thumb {
      height:126px; position:relative; overflow:hidden;
      background:linear-gradient(135deg,#0d0d1c,#1a0a2e);
      display:flex; align-items:center; justify-content:center;
    }
    .thumb-bg { position:absolute; font-size:6rem; opacity:.1; animation:pulse 5s ease-in-out infinite; }
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
    .thumb-icon { position:relative; z-index:1; font-size:3.2rem; filter:drop-shadow(0 0 18px rgba(0,245,255,0.3)); }
    .thumb::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:50%;
      background:linear-gradient(to top, var(--bg2), transparent);
    }

    .badge {
      position:absolute; top:9px; left:9px; z-index:2;
      font-size:.58rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
      padding:3px 9px; border-radius:4px;
    }
    .badge-hot  { background:rgba(255,46,99,.15);  border:1px solid rgba(255,46,99,.35);  color:var(--hot); }
    .badge-new  { background:rgba(0,245,255,.12);  border:1px solid rgba(0,245,255,.3);   color:var(--acc); }
    .badge-free { background:rgba(0,255,136,.1);   border:1px solid rgba(0,255,136,.28);  color:var(--green); }

    .card-body { padding:12px 14px 14px; }
    .card-cat  { font-size:.62rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--acc2); margin-bottom:3px; }
    .card-name { font-size:.98rem; font-weight:800; letter-spacing:.5px; color:#fff; margin-bottom:4px; }
    .card-desc {
      font-size:.75rem; color:var(--muted); line-height:1.5; margin-bottom:9px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-stars { display:flex; align-items:center; gap:6px; margin-bottom:11px; }
    .stars { color:var(--gold); font-size:.7rem; }
    .rating-txt { font-size:.7rem; color:var(--muted); }

    /* ── DOWNLOAD BUTTONS ── */
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .dl-btn {
      display:flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 6px; border-radius:7px;
      font-family:'Oxanium',sans-serif; font-size:.78rem; font-weight:800; letter-spacing:.5px;
      border:none; cursor:pointer; text-decoration:none; color:#fff;
      transition:all .25s; position:relative; overflow:hidden;
    }
    .dl-btn::after {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
      transition:left .4s;
    }
    .dl-btn:hover::after { left:150%; }
    .dl-btn:hover { transform:translateY(-2px); }

    .btn-ios {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.14);
    }
    .btn-ios:hover { background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.26); }

    .btn-and {
      background:linear-gradient(135deg, var(--acc2), var(--acc));
      box-shadow:0 4px 14px rgba(0,245,255,0.18);
    }
    .btn-and:hover { box-shadow:0 7px 22px rgba(0,245,255,0.35); }

    /* ── EMPTY ── */
    .empty { display:none; text-align:center; padding:70px 20px; grid-column:1/-1; }
    .empty.vis { display:block; }
    .empty-icon { font-size:3rem; opacity:.28; margin-bottom:14px; }
    .empty h3 { font-size:1.1rem; color:var(--muted); margin-bottom:6px; }
    .empty p  { font-size:.82rem; color:rgba(232,232,255,.2); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-inner">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search games…" autocomplete="off"/>
        <button class="clear-x" id="clearBtn" onclick="clearSearch()">✕</button>
        <i class="fas fa-search search-icon"></i>
      </div>
      <div class="pills" id="pills">
        <div class="pill active" data-filter="all">All</div>
        <div class="pill" data-filter="hot">🔥 Hot</div>
        <div class="pill" data-filter="action">⚔️ Action</div>
        <div class="pill" data-filter="rhythm">🎵 Rhythm</div>
        <div class="pill" data-filter="rpg">🧙 RPG</div>
        <div class="pill" data-filter="racing">🏎️ Racing</div>
        <div class="pill" data-filter="puzzle">🧩 Puzzle</div>
        <div class="pill" data-filter="shooter">🔫 Shooter</div>
      </div>
    </div>
  </div>

  <main>
    <div class="results-bar"><strong id="cnt">12</strong> games</div>
    <div class="grid" id="grid">
      <div class="empty" id="empty">
        <div class="empty-icon">🔍</div>
        <h3>No games found</h3>
        <p>Try a different search or filter</p>
      </div>
    </div>
  </main>

<script>
const GAMES = [
  { id:1,  name:"FNF Mobile Mods",   cat:"rhythm",  tags:["hot"],  icon:"images/fnf.webp", bg:"🎶", badge:"hot",  desc:"All characters unlocked. 50+ mods, all 7 weeks, zero ads.",         rating:4.9, reviews:"24.8K", ios:"https://tapunlock.co/cl/i/8dp9md", and:"https://tapunlock.co/cl/i/o6wqwn" },
  { id:2,  name:"Hatch Dragons Mod",   cat:"rhythm",  tags:["hot"],  icon:"images/hatch.webp", bg:"🎶", badge:"hot",  desc:"All characters unlocked, zero ads", rating:4.9, reviews:"4.2K", ios:"https://tapunlock.co/cl/i/m55qjn", and:"https://tapunlock.co/cl/i/m55qjn" },
  { id:3,  name:"Coin Master Mod",   cat:"rhythm",  tags:["hot"],  icon:"images/coin.png", bg:"🎶", badge:"hot",  desc:"All characters unlocked, zero ads", rating:4.9, reviews:"7.8K", ios:"https://tapunlock.co/cl/i/rnn65l", and:"https://tapunlock.co/cl/i/rnn65l" },

];

const badgeClass = { hot:"badge-hot", new:"badge-new", free:"badge-free" };
const badgeLabel = { hot:"🔥 HOT", new:"✦ NEW", free:"FREE" };

let activeFilter = "all";
let searchQuery  = "";

function render(){
  const grid  = document.getElementById("grid");
  const empty = document.getElementById("empty");
  grid.querySelectorAll(".card").forEach(c => c.remove());

  const q = searchQuery.toLowerCase();
  const list = GAMES.filter(g => {
    const matchFilter = activeFilter === "all" || g.cat === activeFilter || g.tags.includes(activeFilter);
    const matchSearch = !q || g.name.toLowerCase().includes(q) || g.cat.includes(q) || g.desc.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById("cnt").textContent = list.length;
  empty.classList.toggle("vis", list.length === 0);

  list.forEach((g, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (i * 0.05) + "s";
    card.innerHTML = `
      <div class="thumb">
        <div class="thumb-bg">${g.bg}</div>
        <div class="thumb-icon"><img src="${g.icon}" alt="${g.name}"></div>
        <div class="badge ${badgeClass[g.badge]}">${badgeLabel[g.badge]}</div>
      </div>
      <div class="card-body">
        <div class="card-cat">${g.cat}</div>
        <div class="card-name">${g.name}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-stars">
          <span class="stars">${"★".repeat(Math.round(g.rating))}</span>
          <span class="rating-txt">${g.rating} · ${g.reviews} reviews</span>
        </div>
        <div class="btn-row">
          <a href="${g.ios}" target="_blank" class="dl-btn btn-ios">
            <i class="fab fa-apple"></i> iOS
          </a>
          <a href="${g.and}" target="_blank" class="dl-btn btn-and">
            <i class="fab fa-android"></i> Android
          </a>
        </div>
      </div>`;
    grid.insertBefore(card, empty);
  });

  // analytics
  grid.querySelectorAll(".dl-btn").forEach((btn, idx) => {
    const game = list[Math.floor(idx / 2)];
    const platform = btn.classList.contains("btn-ios") ? "ios" : "android";
    btn.addEventListener("click", () => {
      if(typeof gtag !== "undefined") gtag("event","download_click",{ game_name:game?.name, platform });
      if(typeof fbq  !== "undefined") fbq("track","Lead",{ content_name:game?.name });
    });
  });
}

// search
let deb;
document.getElementById("searchInput").addEventListener("input", function(){
  clearTimeout(deb);
  deb = setTimeout(() => {
    searchQuery = this.value.trim();
    document.getElementById("clearBtn").classList.toggle("vis", searchQuery.length > 0);
    render();
  }, 200);
});

function clearSearch(){
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("clearBtn").classList.remove("vis");
  render();
}

// filter pills
document.getElementById("pills").addEventListener("click", e => {
  const pill = e.target.closest(".pill");
  if(!pill) return;
  activeFilter = pill.dataset.filter;
  document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p === pill));
  render();
});

render();
</script>

</body>
</html>
